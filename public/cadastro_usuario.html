<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles/styles.css">

    <style>
        .erro { color: #f0283c; font-weight: bold; }
        .sucesso { color: #38e76c; font-weight: bold; }
        #toggle { cursor: pointer; color: blue; }
    </style>
</head>

<body class="bg-light">

    <img src="assets/img/trem (2).png" alt="" class="im">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div id="a" class="card shadow p-4" style="width: 100%; max-width: 400px;">

           
            <h3 class="text-center mb-4" id="titulo">Login</h3>

            <form id="form-login">

                <div class="mb-3">
                    <label class="form-label">Nome de Usuário</label>
                    <input type="text" id="nome_usuario" class="form-control" placeholder="Digite seu nome">
                </div>

                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" id="email" class="form-control" placeholder="Digite seu e-mail" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="text" id="telefone" class="form-control" placeholder="Digite seu telefone">
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" required>
                </div>

              
                <a href="../public/tela_inicial.html"><button id="button" type="submit" class="btn btn-primary w-100">Entrar</button> </a>
            </form>

            <div id="mensagem" class="text-center mt-3"></div>

           
            <div id="toggle" class="text-center mt-2">
                Não tem conta? Cadastre-se!
            </div>

        </div>
    </div>

    <script src="../scripts/cadastro_usuario.js"></script>

    <a href="../index.html">
        <button class="botao_voltar_login">
            <img id="botao" src="../assets/img/voltar.png" alt="botao voltar">
        </button>
    </a>

</body>
</html>
