<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Cadastro - Ferrorama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles/styles.css">
    <style>
        .erro { color: #f0283c; font-weight: bold; }
        .sucesso { color: #38e76c; font-weight: bold; }
    </style>
</head>

<body class="bg-light">
    <img src="assets/img/trem (2).png" alt="" class="im">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div id="a" class="card shadow p-4" style="width: 100%; max-width: 400px;">

            <h3 class="text-center mb-4" id="titulo">Login</h3>

            <form id="form-login">
                <div class="mb-3">
                    <label class="form-label" id="l_nome_usuario">Nome de Usuário</label>
                    <input type="text" id="nome_usuario" class="form-control" placeholder="Digite seu nome" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" id="l-senha">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" required>
                </div>

                <button id="b" type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>

            <div id="mensagem" class="text-center mt-3"></div>


        </div>
    </div>

    <script src="../scripts/script.js"></script>

     <a href="../index.html"><button class="botao_voltar_login"><img id="botao" src="../assets/img/voltar.png" alt="botao voltar"></button></a>
</body>
</html>
